spring.application.name=journalApp

#MongoDB
spring.mongodb.uri=${MONGO_URI}
spring.data.mongodb.auto-index-creation=true

#JWT
jwt.secret=${JWT_SECRET}
jwt.expiry-ms=${JWT_EXPIRY_MS:900000}

#Logging
logging.level.root=WARN
logging.level.dev.anamika.journalApp=INFO
logging.file.name=logs/journal-app.log